<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Стоп-лист донорів{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/style.css?v=3" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shield-check"></i> Стоп-лист донорів
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-house"></i> Головна
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/import' %}active{% endif %}" href="/import">
                            <i class="bi bi-cloud-upload"></i> Імпорт ТЗ
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/stoplist' %}active{% endif %}" href="/stoplist">
                            <i class="bi bi-list-check"></i> Стоп-лист
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/stats' %}active{% endif %}" href="/stats">
                            <i class="bi bi-bar-chart"></i> Статистика
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/export' %}active{% endif %}" href="/export">
                            <i class="bi bi-download"></i> Експорт
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/brands' %}active{% endif %}" href="/brands">
                            <i class="bi bi-tags"></i> Бренди
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js?v=3"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
